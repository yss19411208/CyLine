<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CyLine - Cypher定点</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>CyLine</h1>
        <p>Cypher定点</p>
      </div>
      <div class="topbar-actions">
        <button type="button" class="secondary-button" id="reloadButton">再読み込み</button>
        <div class="status" id="statusText">読み込み中</div>
      </div>
    </header>

    <main class="layout">
      <section class="panel filters">
        <label>
          マップ
          <select id="mapFilter"></select>
        </label>
        <label>
          アビリティ
          <select id="abilityFilter">
            <option value="">すべて</option>
            <option value="camera">スパイカメラ</option>
            <option value="cage">サイバーケージ</option>
            <option value="wire">トラップワイヤー</option>
          </select>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="jumpFilter">
          ジャンプのみ
        </label>
      </section>

      <section class="content">
        <section class="map-panel">
          <div class="map-header">
            <h2 id="mapTitle">マップ</h2>
            <p id="mapStatus">マップを選択してください</p>
          </div>
          <div class="map-stage" id="mapStage">
            <img id="mapImage" alt="">
            <div class="map-pins" id="mapPins"></div>
          </div>
        </section>
        <div class="lineup-grid" id="lineupGrid"></div>
      </section>

      <section class="panel register-panel">
        <h2>登録</h2>
        <form id="registerForm">
          <label>
            スクリーンショット
            <input type="file" name="screenshot" accept="image/png,image/jpeg,image/webp" required>
          </label>
          <label>
            マップ
            <select name="map" id="registerMap" required></select>
          </label>
          <label>
            アビリティ
            <select name="ability" required>
              <option value="camera">スパイカメラ</option>
              <option value="cage">サイバーケージ</option>
              <option value="wire">トラップワイヤー</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" name="jump">
            ジャンプする
          </label>
          <label>
            タイトル
            <input type="text" name="title" maxlength="120">
          </label>
          <label>
            説明
            <textarea name="description" rows="4" maxlength="1200"></textarea>
          </label>
          <div class="coordinate-row">
            <label>
              X
              <input type="number" name="position_x" min="0" max="100" step="0.01">
            </label>
            <label>
              Y
              <input type="number" name="position_y" min="0" max="100" step="0.01">
            </label>
          </div>
          <button type="submit">登録</button>
          <p class="form-result" id="formResult"></p>
        </form>
      </section>
    </main>

    <dialog id="detailDialog">
      <article class="detail">
        <button class="close-button" id="closeDialog" aria-label="Close">x</button>
        <img id="detailImage" alt="">
        <div>
          <h2 id="detailTitle"></h2>
          <dl id="detailMeta"></dl>
          <p id="detailDescription"></p>
          <form class="report-form" id="reportForm">
            <input type="hidden" name="lineup_id">
            <h3>報告</h3>
            <label>
              理由
              <select name="reason" required>
                <option value="座標が違う">座標が違う</option>
                <option value="画像が違う">画像が違う</option>
                <option value="マップが違う">マップが違う</option>
                <option value="重複">重複</option>
                <option value="その他">その他</option>
              </select>
            </label>
            <label>
              内容
              <textarea name="message" rows="3" maxlength="1200"></textarea>
            </label>
            <label>
              名前
              <input type="text" name="reporter_name" maxlength="120">
            </label>
            <button type="submit">報告</button>
            <p class="form-result" id="reportResult"></p>
          </form>
        </div>
      </article>
    </dialog>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
